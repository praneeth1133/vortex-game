services:
  - type: web
    name: vortex-game
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: BASE_URL
        fromService:
          type: web
          name: vortex-game
          property: host
      - key: MAX_PLAYERS_PER_ROOM
        value: 50
      - key: TICK_RATE
        value: 60
      - key: WORLD_WIDTH
        value: 6000
      - key: WORLD_HEIGHT
        value: 6000
