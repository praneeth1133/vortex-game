<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - VORTEX</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0a0a2e; color: #e0e0ff; font-family: 'Rajdhani', sans-serif;
    }
    .container { text-align: center; max-width: 440px; padding: 40px 24px; }
    .icon {
      width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 24px;
      background: linear-gradient(135deg, #ff0080, #ff4444);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; box-shadow: 0 0 40px rgba(255, 0, 128, 0.3);
    }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; letter-spacing: 3px; color: #ff0080; margin-bottom: 12px; }
    .subtitle { color: #8888cc; font-size: 16px; margin-bottom: 28px; line-height: 1.5; }
    .btn {
      display: inline-block; padding: 16px 40px; border-radius: 10px; text-decoration: none;
      font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 3px;
      background: linear-gradient(135deg, #00fff2, #0088ff); color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 242, 0.3); transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0, 255, 242, 0.5); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&times;</div>
    <h1>PAYMENT CANCELLED</h1>
    <p class="subtitle">No charges were made. You can try again anytime from the coin shop.</p>
    <a href="/" class="btn">BACK TO GAME</a>
  </div>
</body>
</html>
